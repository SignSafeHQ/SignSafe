<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignSafe Overlay</title>
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@300;400;500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/theme.css" />
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="backdrop">
      <div id="backdrop-tint"></div>
      <div id="panel" role="dialog" aria-modal="true" aria-labelledby="risk-headline">
        <span id="focus-anchor" tabindex="-1"></span>

        <!-- Confirm overlay — shown when review risk user clicks Proceed -->
        <div id="confirm-overlay" class="hidden" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
          <div class="confirm-inner">
            <div id="confirm-title" class="confirm-title">Are you sure?</div>
            <div id="confirm-body" class="confirm-body">This program has not been verified. Only proceed if you personally trust this project.</div>
            <div class="confirm-btns">
              <button id="btn-confirm-back" type="button">Go back</button>
              <button id="btn-confirm-proceed" type="button">Yes, proceed</button>
            </div>
          </div>
        </div>

        <!-- Left accent strip -->
        <div id="accent-strip"></div>

        <!-- HEADER -->
        <div id="panel-hdr">
          <div id="hdr-left">
            <div id="shield-icon">
              <svg viewBox="0 0 14 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
                <path d="M7 1L1.5 3.5V8c0 3 2.2 5.2 5.5 5.8 3.3-.6 5.5-2.8 5.5-5.8V3.5L7 1z"/>
              </svg>
            </div>
            <span id="brand">SignSafe</span>
          </div>
          <div id="site-chip">
            <div class="site-dot"></div>
            <span id="site-chip-text">analyzing…</span>
          </div>
        </div>

        <!-- RISK BLOCK -->
        <div id="risk-block">
          <div id="scan-sweep"></div>
          <div id="risk-kicker">
            <div id="kicker-dot"></div>
            <span id="kicker-text">Analyzing transaction</span>
          </div>
          <div id="rh-loading">
            <div class="skel skel-wide"></div>
            <div class="skel skel-mid"></div>
          </div>
          <h1 id="risk-headline" class="hidden"></h1>
        </div>

        <!-- PANEL BODY -->
        <div id="panel-body">
          <div id="action-list">
            <div class="a-row skel-row">
              <div class="a-icon ico-n">
                <svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="5.5" cy="5.5" r="4"/><path d="M5.5 2v3.5l2 2" stroke-linecap="round"/></svg>
              </div>
              <div class="a-body"><div class="skel skel-body"></div></div>
            </div>
            <div class="a-row skel-row">
              <div class="a-icon ico-n">
                <svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="5.5" cy="5.5" r="4"/><path d="M5.5 2v3.5l2 2" stroke-linecap="round"/></svg>
              </div>
              <div class="a-body"><div class="skel skel-body-short"></div></div>
            </div>
          </div>

          <!-- Danger: advanced options -->
          <button id="adv-toggle" class="hidden" type="button" aria-expanded="false">
            <svg id="adv-chevron" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3.5l3 3 3-3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Advanced options
          </button>
          <div id="adv-content" class="hidden">
            <label class="adv-check-row">
              <input type="checkbox" id="danger-check">
              <span class="adv-check-label">I understand this transaction is likely harmful and I accept full responsibility for any losses</span>
            </label>
            <button id="btn-sign-anyway" type="button" disabled>Sign anyway (strongly not recommended)</button>
          </div>

          <!-- Batch summary area -->
          <div id="batch-area" class="hidden">
            <div id="batch-badge"></div>
            <h1 id="batch-summary"></h1>
            <p id="batch-detail" class="batch-detail"></p>
            <div class="list-card"><ul id="batch-actions"></ul></div>
          </div>
        </div>

        <!-- BUTTONS -->
        <div id="buttons">
          <button id="btn-block" type="button">Block</button>
          <button id="btn-proceed" type="button" disabled>Analyzing…</button>
        </div>

        <!-- FOOTER -->
        <div id="panel-ftr">
          <div id="ftr-brand">SignSafe · AI Analysis</div>
        </div>

        <!-- DEBUG (collapsed) -->
        <details id="debug-details" class="debug-details">
          <summary>Show technical details</summary>
          <div id="debug-meta" class="debug-meta"></div>
          <pre id="debug-json"></pre>
        </details>

      </div>
    </div>

    <script src="shared/constants.js"></script>
    <script src="shared/overlay-helpers.js"></script>
    <script src="src/overlay/overlay.js"></script>
  </body>
</html>
