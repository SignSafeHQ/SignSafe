name: Landing CI

on:
  push:
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"
      - "docs/landing-ci.md"
  pull_request:
    paths:
      - "landing/**"
      - ".github/workflows/landing-ci.yml"
      - "docs/landing-ci.md"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          cat > "$RUNNER_TEMP/eslint.config.mjs" <<'EOF'
          import js from "@eslint/js";
          import tseslint from "typescript-eslint";

          export default [
            js.configs.recommended,
            ...tseslint.configs.recommended,
            {
              files: ["src/**/*.{ts,tsx}", "components/**/*.{ts,tsx}", "vite.config.ts"],
              languageOptions: {
                ecmaVersion: "latest",
                sourceType: "module",
                parserOptions: {
                  ecmaFeatures: { jsx: true },
                },
              },
              rules: {
                "no-undef": "off",
              },
            },
          ];
          EOF

          npx -y \
            -p eslint@10.1.0 \
            -p @eslint/js@10.1.0 \
            -p typescript-eslint@8.58.0 \
            eslint \
            --no-config-lookup \
            --config "$RUNNER_TEMP/eslint.config.mjs" \
            src components vite.config.ts

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: |
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');
          const path = require('path');

          const dir = 'dist/assets';
          const files = fs.existsSync(dir)
            ? fs.readdirSync(dir).filter((name) => name.endsWith('.js')).map((name) => path.join(dir, name))
            : [];
          const maxRaw = 200 * 1024;
          const maxGzip = 60 * 1024;

          if (!files.length) {
            throw new Error('No JavaScript bundles found in dist/assets');
          }

          let failed = false;

          for (const file of files) {
            const buf = fs.readFileSync(file);
            const raw = buf.length;
            const gzip = zlib.gzipSync(buf).length;

            console.log(file + ': ' + raw + ' bytes raw, ' + gzip + ' bytes gzip');

            if (raw > maxRaw || gzip > maxGzip) {
              failed = true;
            }
          }

          if (failed) {
            throw new Error('Bundle budget exceeded');
          }
          NODE
