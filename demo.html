<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignSafe Demo</title>
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Inter", "Segoe UI", sans-serif;
        --ink:         #dde4f0;
        --ink-muted:   #5e7294;
        --ink-dim:     #38506b;
        --line:        rgba(255,255,255,0.06);
        --border:      rgba(255,255,255,0.08);
        --bg-page:     #060a14;
        --bg-panel:    #0b1120;
        --bg-card:     rgba(255,255,255,0.04);

        --safe-color:  #22c97b;
        --safe-bg:     rgba(34,201,123,0.10);
        --safe-border: rgba(34,201,123,0.20);

        --review-color:  #f0a429;
        --review-bg:     rgba(240,164,41,0.10);
        --review-border: rgba(240,164,41,0.22);

        --danger-color:  #f04a4a;
        --danger-bg:     rgba(240,74,74,0.10);
        --danger-border: rgba(240,74,74,0.24);

        --accent:     #4d8fff;
        --accent-bg:  rgba(77,143,255,0.10);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(ellipse 60% 40% at 80% 5%, rgba(77,143,255,0.07), transparent),
          radial-gradient(ellipse 50% 30% at 20% 90%, rgba(120,80,255,0.05), transparent),
          var(--bg-page);
        color: var(--ink);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        padding: 48px 40px 0;
        max-width: 920px;
        margin: 0 auto;
      }

      .wordmark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }

      .wordmark-shield {
        width: 36px;
        height: 36px;
        background: linear-gradient(140deg, #3a7aff, #1a4ec8);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 18px rgba(58,122,255,0.35);
        flex-shrink: 0;
      }

      .wordmark-shield svg { width: 18px; height: 18px; fill: white; }

      .wordmark-text {
        font-size: 18px;
        font-weight: 800;
        color: var(--ink);
        letter-spacing: -0.02em;
      }

      header h1 {
        margin: 0 0 10px;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.035em;
        line-height: 1.1;
        color: var(--ink);
      }

      header h1 em {
        font-style: normal;
        background: linear-gradient(135deg, var(--accent), #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      header p {
        margin: 0;
        max-width: 540px;
        color: var(--ink-muted);
        font-size: 15px;
        line-height: 1.65;
      }

      /* ── Divider ── */
      .section-divider {
        display: flex;
        align-items: center;
        gap: 14px;
        max-width: 920px;
        margin: 36px auto 0;
        padding: 0 40px;
      }

      .section-divider span {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-dim);
        white-space: nowrap;
      }

      .section-divider::before,
      .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      /* ── Grid ── */
      #grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        padding: 16px 40px 0;
        max-width: 920px;
        margin: 0 auto;
      }

      /* ── Cards ── */
      .card {
        padding: 20px 20px 18px;
        border-radius: 16px;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-top: 2px solid var(--border);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        cursor: default;
        transition: transform 160ms ease, box-shadow 160ms ease, border-top-color 160ms ease;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      }

      .card.safe   { border-top-color: var(--safe-color); }
      .card.review { border-top-color: var(--review-color); }
      .card.danger { border-top-color: var(--danger-color); }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .type-tag {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 6px;
      }

      .played-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 999px;
        letter-spacing: 0.04em;
      }

      .played-badge.hidden { display: none; }
      .played-badge.approved { background: var(--safe-bg); color: var(--safe-color); border: 1px solid var(--safe-border); }
      .played-badge.blocked  { background: var(--danger-bg); color: var(--danger-color); border: 1px solid var(--danger-border); }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        border: 1px solid transparent;
      }

      .badge.safe   { background: var(--safe-bg);   color: var(--safe-color);   border-color: var(--safe-border); }
      .badge.review { background: var(--review-bg);  color: var(--review-color); border-color: var(--review-border); }
      .badge.danger { background: var(--danger-bg);  color: var(--danger-color); border-color: var(--danger-border); }

      .card h2 {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.015em;
        color: var(--ink);
        line-height: 1.3;
      }

      .card p {
        margin: 0 0 18px;
        color: var(--ink-muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .card button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid rgba(77,143,255,0.25);
        border-radius: 10px;
        background: var(--accent-bg);
        color: var(--accent);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 140ms ease, box-shadow 140ms ease, transform 100ms ease, border-color 140ms ease;
      }

      .card button:hover {
        background: rgba(77,143,255,0.18);
        border-color: rgba(77,143,255,0.4);
        box-shadow: 0 3px 14px rgba(77,143,255,0.2);
        transform: translateY(-1px);
      }

      .card button:active { transform: translateY(0); }

      .card button svg {
        width: 13px;
        height: 13px;
        fill: currentColor;
        flex-shrink: 0;
      }

      /* ── Result banner ── */
      #result-banner {
        display: none;
        align-items: center;
        gap: 10px;
        max-width: 920px;
        margin: 20px 40px 0;
        padding: 13px 18px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        animation: slideDown 220ms cubic-bezier(0.16,1,0.3,1);
        border: 1px solid transparent;
      }

      #result-banner.approved {
        display: flex;
        background: var(--safe-bg);
        color: var(--safe-color);
        border-color: var(--safe-border);
      }

      #result-banner.blocked {
        display: flex;
        background: var(--danger-bg);
        color: var(--danger-color);
        border-color: var(--danger-border);
      }

      #result-banner svg { width: 16px; height: 16px; flex-shrink: 0; }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Overlay iframe ── */
      #overlay-frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
        display: none;
        z-index: 99999;
      }

      /* ── Footer ── */
      footer {
        padding: 28px 40px;
        max-width: 920px;
        margin: 40px auto 0;
        color: var(--ink-dim);
        font-size: 12px;
        border-top: 1px solid var(--line);
      }

      @media (max-width: 600px) {
        header, #grid, #result-banner, footer { padding-left: 20px; padding-right: 20px; }
        header { padding-top: 32px; }
        header h1 { font-size: 28px; }
        .section-divider { padding: 0 20px; }
      }

      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    </style>
  </head>
  <body>
    <header>
      <div class="wordmark">
        <div class="wordmark-shield">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6L12 2z"/>
          </svg>
        </div>
        <span class="wordmark-text">SignSafe</span>
      </div>
      <h1>Know what you're signing<br><em>before you sign it.</em></h1>
      <p>Preview the overlay shown before any Solana wallet signing request. Click a scenario to see the live analysis UI.</p>
    </header>

    <div class="section-divider"><span>Scenarios</span></div>
    <div id="grid"></div>
    <div id="result-banner"></div>

    <footer>🔒 AI analysis helps spot risk, but it is not a guarantee. Only sign what you understand.</footer>

    <iframe id="overlay-frame" src="overlay.html" title="SignSafe overlay preview"></iframe>
    <script src="shared/constants.js"></script>
    <script src="shared/demo-fixtures.js"></script>
    <script src="src/demo/demo.js"></script>
  </body>
</html>
